<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <img src="logo.jpeg" alt="Logo">
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="home1.html">Home</a></li>
                <li><a href="product.html">Products</a></li>
                <li><a href="about.html">About</a></li>
                
                <li><a href="Login.html">Login</a></li>
                 <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <div class="cart-section">
            <h2>Your Cart</h2>
            <div class="cart-items" id="cart-items">
                <!-- Cart items will be populated here -->
            </div>
            <div class="cart-total" id="cart-total">Total: $0.00</div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>
    <footer>
        <div class="footer-container">
            <h1>Contact Us</h1>
            <li>Email: tharanrajitora@gmail.com</li>
            <li>Telephone: +94767272097</li>
        </div>
    </footer>

    <script>
        // Get cart from localStorage or initialize empty array
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Function to display cart items
        function displayCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartTotalElement = document.getElementById('cart-total');
            cartItemsContainer.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p>Your cart is empty.</p>';
                cartTotalElement.textContent = 'Total: $0.00';
                return;
            }

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                const cartItemDiv = document.createElement('div');
                cartItemDiv.className = 'cart-item';
                cartItemDiv.innerHTML = `
                    <div>${item.name}</div>
                    <div>LKR ${item.price.toFixed(2)}</div>
                    <div>
                        <button onclick="decreaseQuantity(${index})">-</button>
                        Qty: ${item.quantity}
                        <button onclick="increaseQuantity(${index})">+</button>
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
                cartItemsContainer.appendChild(cartItemDiv);
            });

            cartTotalElement.textContent = `Total: LKR ${total.toFixed(2)}`;
        }

        // Function to remove item from cart
        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
            updateCartCount();
        }

        // Function to update cart count in navbar
        function updateCartCount() {
            const cartCount = cart.reduce((total, item) => total + item.quantity, 0);
            const cartCountElement = document.getElementById('cart-count');
            if (cartCountElement) {
                cartCountElement.textContent = cartCount;
                cartCountElement.style.display = cartCount > 0 ? 'block' : 'none';
            }
        }
         document.addEventListener("DOMContentLoaded", updateCartCount);


        // Function to increase quantity
        function increaseQuantity(index) {
            cart[index].quantity += 1;
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
            updateCartCount();
        }

        // Function to decrease quantity
        function decreaseQuantity(index) {
            if (cart[index].quantity > 1) {
                cart[index].quantity -= 1;
                localStorage.setItem('cart', JSON.stringify(cart));
                displayCart();
                updateCartCount();
            } else {
                removeItem(index);
            }
        }

        // Function to handle checkout
        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty. Please add items to checkout.');
                return;
            }

            // Generate receipt content
            let receipt = 'Brew It Receipt\n\n';
            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                receipt += `${item.name} - Qty: ${item.quantity} - LKR ${item.price.toFixed(2)} each - Subtotal: LKR ${itemTotal.toFixed(2)}\n`;
            });
            receipt += `\nTotal: LKR ${total.toFixed(2)}\n\nThank you for your purchase!`;

            // Create a blob for the receipt
            const blob = new Blob([receipt], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);

            // Create a temporary link to download the receipt
            const a = document.createElement('a');
            a.href = url;
            a.download = 'receipt.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // Clear the cart
            localStorage.removeItem('cart');
            cart = [];
            displayCart();
            updateCartCount();

            alert('Checkout successful! Receipt downloaded.');
        }

        // Display cart on page load
        displayCart();
        updateCartCount();
    </script>
</body>
</html>
