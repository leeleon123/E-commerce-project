	<div id="splash-logo">
  <img src="gif2.gif" alt="Logo">
</div>
	<script>
// Function to trigger splash animation on link click
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault();        // prevent immediate navigation
    const url = this.href;
    
    const splash = document.getElementById("splash-logo");
    splash.classList.add("active"); // trigger animation

    // Wait for animation to finish, then navigate
    setTimeout(() => {
      window.location.href = url;
    }, 1000); // match the CSS transition duration
  });
});

// Optional: hide splash on page load after a short delay
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("splash-logo").classList.add("active");
  }, 300); // short delay for fade-in effect
});
</script>
	
</body>
