<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY Franchise</title>
  <style>
	  div{
		  background background-color: pink
	  }
	  
	 
    body { 
		font-family: Arial,sans-serif;
		padding: 20px; 
		max-width: 800px;
		margin: auto; }
	  
	  

    .card 
	  { border: 1px solid #ccc;
		  border-radius: 16px;
		  padding: 16px;
		  margin-bottom: 16px;
		  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
	  }
    .cart-item, .product { 
		display: flex; 
		justify-content: space-between;
		margin-top: 8px; 
	  }
    button { 
		padding: 8px 16px;
		border: none;
		border-radius: 8px;
		background-color: #333; 
		color: white;
		cursor: pointer; 
	  }
    button:hover {
		background-color: #555; 
	  }
    input
	  { 
		  padding: 8px;
		  margin-bottom: 10px;
		  width: 100%;
	  }
    .hidden 
	  {
		  display: none; }
    img 
	  { 
		  max-width: 80px;
		  border-radius: 8px;
		  
	  }
	  
  </style>
</head>
<body>
	
	  
	
  <div id="login">
    <h1>Login</h1>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="shop" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>MY Franchise</h1>
      <button onclick="logout()">Logout</button>
    </div>
    <div id="products"></div>
    <h2>Cart</h2>
    <div id="cart"></div>
    <div id="total"></div>
    <button onclick="checkout()">Checkout</button>
  </div>
  <script>
    const products = [
      { id: 1, name: "Bubble Tea", price: 4.99, image: "Bubble.jpg" },
      { id: 2, name: "Espresso", price: 2.99, image: "Expresso.jpg" },
      { id: 3, name: "Latte", price: 3.99, image: "Latte.jpg" }
    ];

    let cart = [];

    function login() {
      const user = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value.trim();
      if (user === 'admin' && pass === 'password') {
        document.getElementById('login').classList.add('hidden');
        document.getElementById('shop').classList.remove('hidden');
        renderProducts();
        renderCart();
      } else {
        alert('Invalid credentials');
      }
    }

    function logout() {
      cart = [];
      document.getElementById('login').classList.remove('hidden');
      document.getElementById('shop').classList.add('hidden');
    }

    function renderProducts() {
      const container = document.getElementById('products');
      container.innerHTML = '';
      products.forEach(product => {
        const div = document.createElement('div');
        div.className = 'card product';
        div.innerHTML = `
          <img src="${product.image}" alt="${product.name}" />
          <span>${product.name} - $${product.price.toFixed(2)}</span>
          <button onclick="addToCart(${product.id})">Add to Cart</button>
        `;
        container.appendChild(div);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(p => p.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
    }

    function renderCart() {
      const cartDiv = document.getElementById('cart');
      const totalDiv = document.getElementById('total');
      cartDiv.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        total += item.qty * item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <span>${item.name} x ${item.qty}</span>
          <span>$${(item.qty * item.price).toFixed(2)} <button onclick="removeFromCart(${item.id})">Remove</button></span>
        `;
        cartDiv.appendChild(div);
      });
      totalDiv.innerText = `Total: $${total.toFixed(2)}`;
    }

    function checkout() {
      if (cart.length === 0) return alert("Your cart is empty.");
      alert("Checkout successful! Thank you for your purchase.");
      cart = [];
      renderCart();
    }
	
  </script>
</body>
</html>
