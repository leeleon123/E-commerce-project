<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple E-commerce Store</title>
  <style>
    /* Basic reset and styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    body {
      background-color: #f8f9fa;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      margin-bottom: 20px;
      color: #333;
    }
    .container {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1000px;
    }

    /* Product list styling */
    .product-list {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .product-card {
      background-color: #fff;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.3s ease;
    }
    .product-card:hover {
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .product-card img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .product-card h3 {
      margin-bottom: 5px;
      font-size: 18px;
      color: #222;
    }
    .product-card p {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      height: 40px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .product-card .price {
      font-weight: bold;
      margin-bottom: 10px;
      color: #28a745;
    }
    .product-card button {
      padding: 8px 12px;
      background-color: #007bff;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      transition: background-color 0.3s;
    }
    .product-card button:hover {
      background-color: #0056b3;
    }

    /* Cart styling */
    .cart {
      flex: 1;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      max-height: 500px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .cart h2 {
      margin-bottom: 15px;
      color: #333;
    }
    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-name {
      font-weight: bold;
      color: #222;
    }
    .cart-item-qty {
      font-size: 12px;
      color: #666;
    }
    .cart-item-price {
      color: #28a745;
      margin-left: 10px;
    }
    .remove-btn {
      background-color: transparent;
      border: none;
      color: #dc3545;
      cursor: pointer;
      font-size: 16px;
      margin-left: 10px;
    }
    .remove-btn:hover {
      color: #a71d2a;
    }
    .cart-total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 15px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
      color: #333;
      text-align: right;
    }
    .empty-cart {
      color: #777;
      text-align: center;
      margin-top: 50px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Simple E-commerce Store</h1>
  <div class="container">
    <div class="product-list" id="product-list">
      <!-- Products will be injected here -->
    </div>

    <div class="cart">
      <h2>Your Cart</h2>
      <div class="cart-items" id="cart-items">
        <p class="empty-cart">Your cart is empty.</p>
      </div>
      <div class="cart-total" id="cart-total">Total: $0.00</div>
    </div>
  </div>

  <script>
    // Sample product data
    const products = [
      {
        id: 1,
        name: "Wireless Bluetooth Headphones",
        description: "High-quality noise cancellation headphones.",
        price: 59.99,
        image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=150&q=80",
      },
      {
        id: 2,
        name: "Smart Watch",
        description: "Stay connected, track fitness, and more.",
        price: 129.99,
        image: "https://images.unsplash.com/photo-1509395176047-4a66953fd231?auto=format&fit=crop&w=150&q=80",
      },
      {
        id: 3,
        name: "DSLR Camera",
        description: "Capture stunning photos and videos.",
        price: 499.99,
        image: "https://images.unsplash.com/photo-1519183071298-a2962cc37370?auto=format&fit=crop&w=150&q=80",
      },
      {
        id: 4,
        name: "Gaming Mouse",
        description: "Ergonomic and responsive mouse for gamers.",
        price: 29.99,
        image: "https://images.unsplash.com/photo-1589561084283-930aa7b1f9b4?auto=format&fit=crop&w=150&q=80",
      },
      {
        id: 5,
        name: "Laptop Backpack",
        description: "Water-resistant backpack for all your devices.",
        price: 45.0,
        image: "https://images.unsplash.com/photo-1503602642458-232111445657?auto=format&fit=crop&w=150&q=80",
      },
    ];

    const productListEl = document.getElementById("product-list");
    const cartItemsEl = document.getElementById("cart-items");
    const cartTotalEl = document.getElementById("cart-total");

    // Cart array to keep track of items
    let cart = [];

    // Helper function to format currency
    function formatCurrency(num) {
      return "$" + num.toFixed(2);
    }

    // Render product cards
    function renderProducts() {
      productListEl.innerHTML = "";
      products.forEach(product => {
        const productCard = document.createElement("div");
        productCard.className = "product-card";

        productCard.innerHTML = `
          <img src="${product.image}" alt="${product.name}" />
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <div class="price">${formatCurrency(product.price)}</div>
          <button data-id="${product.id}">Add to Cart</button>
        `;

        productListEl.appendChild(productCard);
      });
    }

    // Render cart items
    function renderCart() {
      cartItemsEl.innerHTML = "";

      if (cart.length === 0) {
        cartItemsEl.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
        cartTotalEl.textContent = "Total: $0.00";
        return;
      }

      cart.forEach(item => {
        const product = products.find(p => p.id === item.id);
        const cartItem = document.createElement("div");
        cartItem.className = "cart-item";
        cartItem.innerHTML = `
          <div class="cart-item-details">
            <div class="cart-item-name">${product.name}</div>
            <div class="cart-item-qty">Quantity: ${item.qty}</div>
          </div>
          <div class="cart-item-price">${formatCurrency(product.price * item.qty)}</div>
          <button class="remove-btn" data-id="${item.id}">&times;</button>
        `;
        cartItemsEl.appendChild(cartItem);
      });

      const totalPrice = cart.reduce((total, item) => {
        const product = products.find(p => p.id === item.id);
        return total + product.price * item.qty;
      }, 0);

      cartTotalEl.textContent = `Total: ${formatCurrency(totalPrice)}`;
    }

    // Add product to cart
    function addToCart(id) {
      const existingItem = cart.find(item => item.id === id);
      if (existingItem) {
        existingItem.qty += 1;
      } else {
        cart.push({ id, qty: 1 });
      }
      renderCart();
    }

    // Remove item from cart
    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
    }

    // Initialize
    function init() {
      renderProducts();
      renderCart();

      // Event listeners for Add to Cart buttons
      productListEl.addEventListener("click", e => {
        if (e.target.tagName === "BUTTON") {
          const id = parseInt(e.target.getAttribute("data-id"));
          addToCart(id);
        }
      });

      // Event listeners for Remove buttons in cart
      cartItemsEl.addEventListener("click", e => {
        if (e.target.classList.contains("remove-btn")) {
          const id = parseInt(e.target.getAttribute("data-id"));
          removeFromCart(id);
        }
      });
    }

    init();
  </script>
</body>
</html>
